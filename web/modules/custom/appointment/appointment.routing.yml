appointment.book:
  path: "/appointment/book"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentBookForm'
    _title: "Book appointment"
  requirements:
    _access: "TRUE"

appointment.book_slash:
  path: "/appointment/book/"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentBookForm'
    _title: "Book appointment"
  requirements:
    _access: "TRUE"

appointment.book_step:
  path: "/appointment/book/{step}"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentBookForm'
    _title: "Book appointment"
    step: 1
  requirements:
    _access: "TRUE"
    step: '\d+'

appointment.edit:
  path: "/appointment/{appointment}/edit"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentBookForm'
    _title: "Modify appointment"
  requirements:
    _access: "TRUE"
  options:
    parameters:
      appointment:
        type: entity:appointment

appointment.edit_step:
  path: "/appointment/{appointment}/edit/{step}"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentBookForm'
    _title: "Modify appointment"
    step: 1
  requirements:
    _access: "TRUE"
    step: '\d+'
  options:
    parameters:
      appointment:
        type: entity:appointment

appointment.cancel:
  path: "/appointment/{appointment}/cancel"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentCancelForm'
    _title: "Cancel appointment"
  requirements:
    _access: "TRUE"
  options:
    parameters:
      appointment:
        type: entity:appointment

appointment.confirmation:
  path: "/appointment/{appointment}/confirmation"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentController::confirmation'
    _title: "Appointment confirmation"
  requirements:
    _access: "TRUE"
  options:
    parameters:
      appointment:
        type: entity:appointment

appointment.my_appointments:
  path: "/appointment/my"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentController::myAppointments'
    _title: "My appointments"
  requirements:
    _access: "TRUE"

appointment.lookup:
  path: "/appointment/lookup"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentLookupForm'
    _title: "Find my appointments"
  requirements:
    _access: "TRUE"

appointment.api_booked_slots:
  path: "/appointment/api/booked-slots"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentController::bookedSlots'
  requirements:
    _access: "TRUE"
  options:
    no_cache: TRUE

# --- Admin routes ---

appointment.admin_dashboard:
  path: "/admin/structure/appointment"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentAdminController::dashboard'
    _title: "Appointment Management"
  requirements:
    _permission: "administer appointments"

appointment.admin_list:
  path: "/admin/structure/appointment/list"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentAdminController::listAppointments'
    _title: "All Appointments"
  requirements:
    _permission: "administer appointments"

appointment.admin_export_csv:
  path: "/admin/structure/appointment/export"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentExportForm'
    _title: "Export Appointments to CSV"
  requirements:
    _permission: "administer appointments"

appointment.admin_download_csv:
  path: "/admin/structure/appointment/download-csv"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentAdminController::downloadCsv'
  requirements:
    _permission: "administer appointments"

appointment.admin_settings:
  path: "/admin/structure/appointment/settings"
  defaults:
    _form: '\Drupal\appointment\Form\AppointmentSettingsForm'
    _title: "Appointment Settings"
  requirements:
    _permission: "administer appointments"

appointment.admin_confirm:
  path: "/admin/structure/appointment/{appointment}/confirm"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentAdminController::confirmAppointment'
    _title: "Confirm Appointment"
  requirements:
    _permission: "administer appointments"
  options:
    parameters:
      appointment:
        type: entity:appointment

appointment.admin_delete:
  path: "/admin/structure/appointment/{appointment}/delete"
  defaults:
    _controller: '\Drupal\appointment\Controller\AppointmentAdminController::deleteAppointment'
    _title: "Delete Appointment"
  requirements:
    _permission: "administer appointments"
  options:
    parameters:
      appointment:
        type: entity:appointment
